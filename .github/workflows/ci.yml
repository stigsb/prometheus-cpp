name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  deployments: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC 13 (x64)
            os: ubuntu-24.04
            cc: gcc-13
            cxx: g++-13
          - name: GCC 14 (x64)
            os: ubuntu-24.04
            cc: gcc-14
            cxx: g++-14
          - name: Clang 18 (x64)
            os: ubuntu-24.04
            cc: clang-18
            cxx: clang++-18
          - name: GCC 14 (arm64)
            os: ubuntu-24.04-arm
            cc: gcc-14
            cxx: g++-14
          - name: Clang 18 (arm64)
            os: ubuntu-24.04-arm
            cc: clang-18
            cxx: clang++-18

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPROMETHEUS_BUILD_TESTS=ON \
            -DPROMETHEUS_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan + UBSan
            flag: PROMETHEUS_ENABLE_ASAN
          - name: TSan
            flag: PROMETHEUS_ENABLE_TSAN

    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPROMETHEUS_BUILD_TESTS=ON \
            -D${{ matrix.flag }}=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPROMETHEUS_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: Collect coverage
        run: |
          sudo apt-get install -y lcov
          lcov --capture --directory build --output-file coverage.info \
            --gcov-tool gcov-14 --ignore-errors mismatch,negative
          lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' \
            --output-file coverage.info --ignore-errors unused,negative
          lcov --list coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmarks:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Bench (x64)
            os: ubuntu-24.04
            arch: x64
            cc: gcc-14
            cxx: g++-14
          - name: Bench (arm64)
            os: ubuntu-24.04-arm
            arch: arm64
            cc: gcc-14
            cxx: g++-14

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROMETHEUS_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run benchmarks
        run: |
          ./build/bench/prometheus_bench \
            --benchmark_repetitions=3 \
            --benchmark_report_aggregates_only=true \
            --benchmark_out=bench_results.json \
            --benchmark_out_format=json

      - name: Store benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Benchmarks (${{ matrix.arch }})"
          tool: googlecpp
          output-file-path: bench_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/${{ matrix.arch }}
          alert-threshold: "115%"
          comment-on-alert: true
          fail-on-alert: false

      - name: Compare benchmarks (PR)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Benchmarks (${{ matrix.arch }})"
          tool: googlecpp
          output-file-path: bench_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/${{ matrix.arch }}
          alert-threshold: "115%"
          comment-on-alert: true
          fail-on-alert: true

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.arch }}
          path: bench_results.json
